x-defaults: &default-settings
  environment:
    SERVERNAME: juicyshop.local
    PARANOIA: 1
    BLOCKING_PARANOIA: 1
    ANOMALY_INBOUND: 7
    ANOMALY_OUTBOUND: 7
    BACKEND: http://juicyshop:3000

    MODSEC_RULE_ENGINE: On
    MODSEC_AUDIT_ENGINE: RelevantOnly
    MODSEC_AUDIT_LOG: /dev/stdout
    MODSEC_AUDIT_LOG_TYPE: Serial
    MODSEC_AUDIT_LOG_FORMAT: JSON
    MODSEC_AUDIT_LOG_PARTS: ABIJDEFHZ

  volumes:
    - ./rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf
    - ./rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf

services:
  juicyshop:
    image: bkimminich/juice-shop:latest

  waf-nginx:
    image: owasp/modsecurity-crs:nginx
    container_name: waf-nginx
    depends_on:
      - juicyshop
      - logstash
    ports:
      - "80:8080"
    <<: *default-settings
    logging:
      driver: syslog
      options:
        syslog-address: "tcp://127.0.0.1:5514"
        tag: "waf-nginx"
        syslog-format: "rfc5424"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: logstash
    depends_on:
      - elasticsearch
    ports:
      - "5514:5514/tcp"
      - "5514:5514/udp"
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: kibana
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"

  kibana-setup:
    image: curlimages/curl:8.10.1
    container_name: kibana-setup
    depends_on:
      - kibana
    restart: on-failure
    command:
      - sh
      - -c
      - |
        echo "Waiting for Kibana...";
        until curl -s http://kibana:5601/api/status | grep -q '"level":"available"'; do
          sleep 5;
        done;

        echo "Creating Kibana data view modsecurity-*...";

        curl -sS -X POST "http://kibana:5601/api/data_views/data_view" \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{
            "data_view": {
              "title": "modsecurity-*",
              "name": "ModSecurity WAF Logs",
              "timeFieldName": "@timestamp",
              "allowNoIndex": true
            },
            "override": true
          }';

        echo "";
        echo "Kibana setup done.";
volumes:
  elasticsearch-data: