input {
  tcp {
    port => 5514
    codec => plain {
      charset => "ISO-8859-1"
    }
  }

  udp {
    port => 5514
    codec => plain {
      charset => "ISO-8859-1"
    }
  }
}

filter {
  grok {
    match => {
      "message" => "^<%{POSINT:syslog.priority}>%{POSINT:syslog.version} %{TIMESTAMP_ISO8601:syslog.timestamp} %{DATA:host.hostname} %{DATA:process.name} %{DATA:process.pid} %{DATA:syslog.appname} - %{GREEDYDATA:modsec_json}$"
    }
    tag_on_failure => ["_syslog_rfc5424_grok_failure"]
  }

  if ![modsec_json] {
    grok {
      match => {
        "message" => ".*(?<modsec_json>\{.*\})"
      }
      tag_on_failure => ["_modsec_json_extract_failure"]
    }
  }

  if [modsec_json] {
    mutate {
      gsub => [
        "modsec_json", '"body":"(?:\\.|[^"\\])*",', '',
        "modsec_json", ',"body":"(?:\\.|[^"\\])*"', ''
      ]
    }

    json {
      source => "modsec_json"
      target => "modsecurity"
      tag_on_failure => ["_modsec_json_parse_failure"]
    }
  }

  if ![modsecurity][transaction] {
    mutate {
      add_tag => ["not_modsecurity_json"]
    }
  }

  if [modsecurity][transaction] {
    mutate {
      add_field => {
        "event.module" => "modsecurity"
        "event.dataset" => "modsecurity.audit"
        "event.kind" => "event"
        "service.name" => "waf-nginx"
        "service.type" => "waf"
      }
    }

    if [modsecurity][transaction][client_ip] {
      mutate {
        add_field => {
          "client.ip" => "%{[modsecurity][transaction][client_ip]}"
        }
      }
    }

    if [modsecurity][transaction][host_ip] {
      mutate {
        add_field => {
          "server.ip" => "%{[modsecurity][transaction][host_ip]}"
        }
      }
    }

    if [modsecurity][transaction][client_port] {
      mutate {
        add_field => {
          "client.port" => "%{[modsecurity][transaction][client_port]}"
        }
        convert => {
          "client.port" => "integer"
        }
      }
    }

    if [modsecurity][transaction][host_port] {
      mutate {
        add_field => {
          "server.port" => "%{[modsecurity][transaction][host_port]}"
        }
        convert => {
          "server.port" => "integer"
        }
      }
    }

    if [modsecurity][transaction][request][method] {
      mutate {
        add_field => {
          "http.request.method" => "%{[modsecurity][transaction][request][method]}"
        }
      }
    }

    if [modsecurity][transaction][request][uri] {
      mutate {
        add_field => {
          "url.original" => "%{[modsecurity][transaction][request][uri]}"
        }
      }
    }

    if [modsecurity][transaction][request][http_version] {
      mutate {
        add_field => {
          "http.version" => "%{[modsecurity][transaction][request][http_version]}"
        }
      }
    }

    if [modsecurity][transaction][request][headers][Host] {
      mutate {
        add_field => {
          "url.domain" => "%{[modsecurity][transaction][request][headers][Host]}"
        }
      }
    }

    if [modsecurity][transaction][request][headers][User-Agent] {
      mutate {
        add_field => {
          "user_agent.original" => "%{[modsecurity][transaction][request][headers][User-Agent]}"
        }
      }
    }

    if [modsecurity][transaction][response][http_code] {
      mutate {
        add_field => {
          "http.response.status_code" => "%{[modsecurity][transaction][response][http_code]}"
        }
        convert => {
          "http.response.status_code" => "integer"
        }
      }
    }

    if [modsecurity][transaction][unique_id] {
      mutate {
        add_field => {
          "event.id" => "%{[modsecurity][transaction][unique_id]}"
        }
      }
    }

    if [modsecurity][transaction][producer][modsecurity] {
      mutate {
        add_field => {
          "observer.version" => "%{[modsecurity][transaction][producer][modsecurity]}"
        }
      }
    }

    if [modsecurity][transaction][producer][connector] {
      mutate {
        add_field => {
          "observer.product" => "%{[modsecurity][transaction][producer][connector]}"
        }
      }
    }

    if [modsecurity][transaction][messages][0][message] {
      mutate {
        add_field => {
          "event.kind" => "alert"
          "rule.message" => "%{[modsecurity][transaction][messages][0][message]}"
        }
      }
    }

    if [modsecurity][transaction][messages][0][details][ruleId] {
      mutate {
        add_field => {
          "rule.id" => "%{[modsecurity][transaction][messages][0][details][ruleId]}"
        }
      }
    }

    if [modsecurity][transaction][messages][0][details][severity] {
      mutate {
        add_field => {
          "rule.severity" => "%{[modsecurity][transaction][messages][0][details][severity]}"
        }
      }
    }

    if [modsecurity][transaction][messages][0][details][data] {
      mutate {
        add_field => {
          "rule.data" => "%{[modsecurity][transaction][messages][0][details][data]}"
        }
      }
    }

    if [modsecurity][transaction][messages][0][details][match] {
      mutate {
        add_field => {
          "rule.match" => "%{[modsecurity][transaction][messages][0][details][match]}"
        }
      }
    }

    date {
      match => [
        "[modsecurity][transaction][time_stamp]",
        "EEE MMM dd HH:mm:ss yyyy",
        "EEE MMM  d HH:mm:ss yyyy"
      ]
      target => "@timestamp"
      timezone => "UTC"
      tag_on_failure => ["_modsec_dateparsefailure"]
    }
  }
}

output {
  if [modsecurity][transaction] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "modsecurity-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "debug-unparsed-%{+YYYY.MM.dd}"
    }
  }

  stdout {
    codec => rubydebug
  }
}